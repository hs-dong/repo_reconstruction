<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Reconstruction Evaluation - V2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --accent-purple: #a371f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background: var(--bg-secondary) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--text-primary) !important;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-brand i {
            color: var(--accent-blue);
        }

        .main-container {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .content-area {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title i {
            font-size: 1rem;
        }

        .form-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .form-control:focus, .form-select:focus {
            background: var(--bg-primary);
            border-color: var(--accent-blue);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .btn-primary {
            background: var(--accent-blue);
            border: none;
            padding: 0.7rem 1.5rem;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #79b8ff;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: var(--bg-tertiary);
            cursor: not-allowed;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .card-header {
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h5 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body {
            padding: 1.25rem;
        }

        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .version-badge.commit {
            background: rgba(163, 113, 247, 0.15);
            color: var(--accent-purple);
        }

        .version-badge.require {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
        }

        .stat-item {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .similarity-bar {
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .similarity-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-yellow), var(--accent-green));
            transition: width 0.5s ease;
        }

        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 1.5rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2rem;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-blue);
            border: 2px solid var(--bg-secondary);
        }

        .timeline-item.commit::before {
            background: var(--accent-purple);
        }

        .timeline-item.snapshot::before {
            background: var(--accent-green);
        }

        .timeline-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .timeline-content {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.75rem 1rem;
        }

        .file-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-name {
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            color: var(--accent-blue);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-status {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 0.5rem;
            flex-shrink: 0;
        }

        .file-status.identical {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
        }

        .file-status.different {
            background: rgba(210, 153, 34, 0.15);
            color: var(--accent-yellow);
        }

        .file-status.missing {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
        }

        .diff-view {
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 0.85rem;
            background: var(--bg-primary);
            border-radius: 6px;
            overflow: hidden;
        }

        .diff-header {
            background: var(--bg-tertiary);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        .diff-content {
            display: flex;
        }

        .diff-side {
            flex: 1;
            overflow-x: auto;
        }

        .diff-side.left {
            border-right: 1px solid var(--border-color);
        }

        .diff-line {
            display: flex;
            min-height: 20px;
            line-height: 20px;
        }

        .line-num {
            width: 50px;
            text-align: right;
            padding: 0 0.5rem;
            color: var(--text-secondary);
            user-select: none;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .line-content {
            padding: 0 1rem;
            white-space: pre;
            flex: 1;
        }

        .line-content.added {
            background: rgba(63, 185, 80, 0.15);
        }

        .line-content.removed {
            background: rgba(248, 81, 73, 0.15);
        }

        .line-content.modified {
            background: rgba(210, 153, 34, 0.15);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .loading-spinner {
            text-align: center;
            color: var(--text-primary);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .user-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 0.5rem;
        }

        .user-item:hover, .user-item.active {
            background: var(--bg-tertiary);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-right: 0.75rem;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .alert-custom {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .alert-custom.success {
            border-left: 4px solid var(--accent-green);
        }

        .alert-custom.error {
            border-left: 4px solid var(--accent-red);
        }

        .alert-custom.info {
            border-left: 4px solid var(--accent-blue);
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        /* 响应式 */
        @media (max-width: 992px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }

        /* Tab样式 */
        .nav-tabs {
            border-bottom: 1px solid var(--border-color);
            gap: 0.5rem;
        }

        .nav-tabs .nav-link {
            color: var(--text-secondary);
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 6px 6px 0 0;
            transition: all 0.2s;
        }

        .nav-tabs .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .nav-tabs .nav-link.active {
            color: var(--accent-blue);
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent-blue);
        }

        .comparison-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .comparison-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a class="navbar-brand" href="#">
            <i class="bi bi-git"></i>
            Repo Reconstruction Evaluation V2
        </a>
        <div>
            <button class="btn-outline" onclick="refreshData()">
                <i class="bi bi-arrow-clockwise"></i> 刷新数据
            </button>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 侧边栏 - 查询表单 -->
        <div class="sidebar">
            <div class="section-title">
                <i class="bi bi-search"></i>
                查询参数
            </div>

            <form id="queryForm">
                <!-- 用户选择 -->
                <div class="mb-3">
                    <label class="form-label">User ID</label>
                    <select class="form-select" id="userSelect" required>
                        <option value="">选择用户...</option>
                    </select>
                </div>

                <!-- GitHub用户名 -->
                <div class="mb-3">
                    <label class="form-label">GitHub 用户名</label>
                    <input type="text" class="form-control" id="githubUsername" 
                           placeholder="例如: xwellxia" required>
                </div>

                <!-- 时间选择 -->
                <div class="mb-3">
                    <label class="form-label">查询时间点</label>
                    <input type="datetime-local" class="form-control" id="targetTime" required>
                </div>

                <button type="submit" class="btn btn-primary w-100" id="queryBtn">
                    <i class="bi bi-search"></i> 执行查询
                </button>
            </form>

            <hr style="border-color: var(--border-color); margin: 1.5rem 0;">

            <!-- 用户列表 -->
            <div class="section-title">
                <i class="bi bi-people"></i>
                已知用户
            </div>
            <div class="user-list" id="userList">
                <!-- 动态填充 -->
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="content-area">
            <!-- 初始状态 -->
            <div id="emptyState" class="empty-state">
                <i class="bi bi-layers"></i>
                <h4>开始查询</h4>
                <p>在左侧输入查询参数，点击"执行查询"按钮开始版本对比</p>
            </div>

            <!-- 查询结果 -->
            <div id="resultArea" style="display: none;">
                <!-- 概览卡片 -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="bi bi-git" style="color: var(--accent-purple);"></i> Commit 版本</h5>
                                <span class="version-badge commit">
                                    <i class="bi bi-tag"></i>
                                    <span id="commitHash">-</span>
                                </span>
                            </div>
                            <div class="card-body">
                                <p><strong>提交时间:</strong> <span id="commitTime">-</span></p>
                                <p><strong>提交者:</strong> <span id="commitAuthor">-</span></p>
                                <p><strong>提交信息:</strong> <span id="commitMessage">-</span></p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="bi bi-archive" style="color: var(--accent-green);"></i> Require 版本 (快照)</h5>
                                <span class="version-badge require">
                                    <i class="bi bi-calendar"></i>
                                    <span id="snapshotDate">-</span>
                                </span>
                            </div>
                            <div class="card-body">
                                <p><strong>请求ID:</strong> <span id="requestId" style="font-family: monospace;">-</span></p>
                                <p><strong>文件数量:</strong> <span id="fileCount">-</span></p>
                                <p><strong>还原状态:</strong> <span id="restoreStatus">-</span></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 相似度统计 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5><i class="bi bi-bar-chart"></i> 对比统计</h5>
                    </div>
                    <div class="card-body">
                        <div class="stats-grid" id="statsGrid">
                            <div class="stat-item">
                                <div class="stat-value" id="statTotal">0</div>
                                <div class="stat-label">总文件数</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" style="color: var(--accent-green);" id="statIdentical">0</div>
                                <div class="stat-label">完全一致</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" style="color: var(--accent-yellow);" id="statDifferent">0</div>
                                <div class="stat-label">存在差异</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" style="color: var(--accent-red);" id="statMissing">0</div>
                                <div class="stat-label">缺失文件</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="statSimilarity">0%</div>
                                <div class="stat-label">平均相似度</div>
                                <div class="similarity-bar">
                                    <div class="similarity-fill" id="similarityBar" style="width: 0%;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 文件列表 -->
                <div class="card">
                    <div class="card-header">
                        <h5><i class="bi bi-file-earmark-code"></i> 文件对比详情</h5>
                        <div>
                            <button class="btn-outline btn-sm" onclick="filterFiles('all')">全部</button>
                            <button class="btn-outline btn-sm" onclick="filterFiles('different')">有差异</button>
                            <button class="btn-outline btn-sm" onclick="filterFiles('missing')">缺失</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="file-list" id="fileList">
                            <!-- 动态填充 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p id="loadingText">正在查询...</p>
        </div>
    </div>

    <!-- 文件详情模态框 -->
    <div class="modal fade" id="fileDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content" style="background: var(--bg-secondary); border: 1px solid var(--border-color);">
                <div class="modal-header" style="border-bottom: 1px solid var(--border-color);">
                    <h5 class="modal-title" id="modalFileName">-</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="padding: 0;">
                    <div class="diff-view">
                        <div class="diff-header">
                            <span style="color: var(--accent-green);"><i class="bi bi-archive"></i> 还原版本</span>
                            <span style="color: var(--accent-purple);"><i class="bi bi-git"></i> Commit版本</span>
                        </div>
                        <div class="diff-content" id="diffContent">
                            <!-- 动态填充 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局状态
        const state = {
            users: [],
            currentResult: null,
            currentFiles: []
        };

        // API基础URL
        const API_BASE = '';

        // ==================== 工具函数 ====================

        function showLoading(text = '正在加载...') {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        function showAlert(message, type = 'info') {
            const alertHtml = `
                <div class="alert-custom ${type}">
                    <i class="bi bi-${type === 'error' ? 'exclamation-circle' : type === 'success' ? 'check-circle' : 'info-circle'}"></i>
                    ${message}
                </div>
            `;
            // 可以添加到页面顶部或其他位置
            console.log(`[${type}] ${message}`);
        }

        // ==================== API调用 ====================

        async function fetchUsers() {
            try {
                const response = await fetch(`${API_BASE}/api/users`);
                const data = await response.json();
                if (data.success) {
                    state.users = data.users;
                    renderUserList();
                    populateUserSelect();
                }
            } catch (error) {
                console.error('获取用户列表失败:', error);
            }
        }

        async function executeQuery(userId, githubUsername, targetTime) {
            showLoading('正在查询版本信息...');
            
            try {
                const response = await fetch(`${API_BASE}/api/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        github_username: githubUsername,
                        target_time: targetTime
                    })
                });
                
                const data = await response.json();
                hideLoading();
                
                if (data.success) {
                    state.currentResult = data;
                    renderResult(data);
                } else {
                    showAlert(data.error || '查询失败', 'error');
                }
            } catch (error) {
                hideLoading();
                showAlert('查询请求失败: ' + error.message, 'error');
            }
        }

        // ==================== 渲染函数 ====================

        function renderUserList() {
            const container = document.getElementById('userList');
            
            if (state.users.length === 0) {
                container.innerHTML = '<p class="text-muted">暂无用户数据</p>';
                return;
            }
            
            container.innerHTML = state.users.map(user => `
                <div class="user-item" onclick="selectUser('${user.user_id}', '${user.github_username}')">
                    <div class="user-avatar">${user.name.charAt(0)}</div>
                    <div class="user-info">
                        <div class="user-name">${user.name}</div>
                        <div class="user-meta">
                            <i class="bi bi-github"></i> ${user.github_username || 'N/A'}
                            · ${user.snapshot_count} 个快照
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function populateUserSelect() {
            const select = document.getElementById('userSelect');
            select.innerHTML = '<option value="">选择用户...</option>' + 
                state.users.map(user => 
                    `<option value="${user.user_id}" data-github="${user.github_username}">${user.name} (${user.user_id.substring(0, 8)}...)</option>`
                ).join('');
        }

        function selectUser(userId, githubUsername) {
            document.getElementById('userSelect').value = userId;
            document.getElementById('githubUsername').value = githubUsername || '';
            
            // 高亮选中的用户
            document.querySelectorAll('.user-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
        }

        function renderResult(data) {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            
            // 渲染Commit版本信息
            if (data.commit_version) {
                document.getElementById('commitHash').textContent = data.commit_version.short_hash || '-';
                document.getElementById('commitTime').textContent = data.commit_version.date || '-';
                document.getElementById('commitAuthor').textContent = data.commit_version.author_name || '-';
                document.getElementById('commitMessage').textContent = data.commit_version.message || '-';
            }
            
            // 渲染快照版本信息
            if (data.require_version) {
                const snapshot = data.require_version.snapshot;
                document.getElementById('snapshotDate').textContent = snapshot?.date || '-';
                document.getElementById('requestId').textContent = snapshot?.request_id || '-';
                document.getElementById('fileCount').textContent = data.require_version.file_count || 0;
                document.getElementById('restoreStatus').textContent = 
                    data.require_version.restored ? '✓ 成功' : '✗ 失败';
            }
            
            // 渲染对比统计
            if (data.comparison) {
                const comp = data.comparison;
                document.getElementById('statTotal').textContent = comp.total_restored_files || 0;
                document.getElementById('statIdentical').textContent = comp.identical_files || 0;
                document.getElementById('statDifferent').textContent = comp.different_files || 0;
                document.getElementById('statMissing').textContent = comp.missing_in_actual || 0;
                
                const similarity = (comp.avg_similarity || 0) * 100;
                document.getElementById('statSimilarity').textContent = similarity.toFixed(1) + '%';
                document.getElementById('similarityBar').style.width = similarity + '%';
                
                // 渲染文件列表
                if (comp.file_details) {
                    state.currentFiles = comp.file_details;
                    renderFileList(comp.file_details);
                }
            }
        }

        function renderFileList(files) {
            const container = document.getElementById('fileList');
            
            if (!files || files.length === 0) {
                container.innerHTML = '<p class="text-muted">暂无文件数据</p>';
                return;
            }
            
            // 按状态排序：different > missing > identical
            const statusOrder = { 'different': 0, 'missing_in_actual': 1, 'identical': 2 };
            files.sort((a, b) => (statusOrder[a.status] || 9) - (statusOrder[b.status] || 9));
            
            container.innerHTML = files.map(file => {
                const statusClass = file.status === 'identical' ? 'identical' : 
                                   file.status === 'different' ? 'different' : 'missing';
                const statusText = file.status === 'identical' ? '一致' : 
                                  file.status === 'different' ? `差异 ${(file.similarity * 100).toFixed(1)}%` : '缺失';
                
                return `
                    <div class="file-item" data-status="${file.status}" onclick="showFileDetail('${file.rel_path}')">
                        <span class="file-name" title="${file.rel_path}">
                            <i class="bi bi-file-earmark-code"></i>
                            ${file.rel_path}
                        </span>
                        <span class="file-status ${statusClass}">${statusText}</span>
                    </div>
                `;
            }).join('');
        }

        function filterFiles(status) {
            const items = document.querySelectorAll('.file-item');
            items.forEach(item => {
                if (status === 'all') {
                    item.style.display = '';
                } else {
                    item.style.display = item.dataset.status === status ? '' : 'none';
                }
            });
        }

        function showFileDetail(filePath) {
            const file = state.currentFiles.find(f => f.rel_path === filePath);
            if (!file) return;
            
            document.getElementById('modalFileName').textContent = filePath;
            
            // 显示diff内容（如果有）
            const diffContent = document.getElementById('diffContent');
            if (file.diff_preview) {
                diffContent.innerHTML = `
                    <div style="padding: 1rem; font-family: monospace; white-space: pre-wrap; overflow-x: auto;">
                        ${escapeHtml(file.diff_preview)}
                    </div>
                `;
            } else {
                diffContent.innerHTML = `
                    <div style="padding: 2rem; text-align: center; color: var(--text-secondary);">
                        ${file.status === 'identical' ? '文件内容完全一致' : '无详细diff数据'}
                    </div>
                `;
            }
            
            const modal = new bootstrap.Modal(document.getElementById('fileDetailModal'));
            modal.show();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 事件处理 ====================

        document.getElementById('queryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('userSelect').value;
            const githubUsername = document.getElementById('githubUsername').value;
            const targetTimeInput = document.getElementById('targetTime').value;
            
            if (!userId || !githubUsername || !targetTimeInput) {
                showAlert('请填写所有必填字段', 'error');
                return;
            }
            
            // 转换时间格式
            const targetTime = targetTimeInput.replace('T', ' ') + ':00';
            
            await executeQuery(userId, githubUsername, targetTime);
        });

        document.getElementById('userSelect').addEventListener('change', (e) => {
            const selectedOption = e.target.selectedOptions[0];
            const github = selectedOption?.dataset?.github;
            if (github) {
                document.getElementById('githubUsername').value = github;
            }
        });

        function refreshData() {
            fetchUsers();
        }

        // ==================== 初始化 ====================

        document.addEventListener('DOMContentLoaded', () => {
            // 设置默认时间为当前时间
            const now = new Date();
            const localTime = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
            document.getElementById('targetTime').value = localTime.toISOString().slice(0, 16);
            
            // 加载用户数据
            fetchUsers();
        });
    </script>
</body>
</html>
